[keyboard]
bindings = [
    { key = "N", mods = "Control|Shift", command = { program = "bash", args = ["-c", "alacritty"] } },
    # { key = "U", mods = "Control|Shift", action = "ScrollToTop" },
    # { key = "D", mods = "Control|Shift", action = "ScrollToBottom" },
]

[font]
normal = { family = "Input Mono", style = "Regular" }
bold = { family = "Input Mono", style = "Bold" }
italic = { family = "Input Mono", style = "Italic" }
bold_italic = { family = "Input Mono", style = "Bold Italic" }
size = 15.0

[window]
startup_mode = "Maximized"
