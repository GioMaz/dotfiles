# Split panes using | and -
bind | split-window -h
bind - split-window -v
unbind "%"
unbind '"'

# Reload config file
bind r source-file ~/.tmux.conf

# Enable mouse mode
set -g mouse on

# Disable Esc delay
set -s escape-time 0

# Use Alt-<direction> to focus panes
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Use Alt-Shift-<direction> to resize panes
bind -n M-S-Left    resize-pane -L 2
bind -n M-S-Right   resize-pane -R 2
bind -n M-S-Up      resize-pane -U 2
bind -n M-S-Down    resize-pane -D 2

# Start window index at 1
set -g base-index 1

# Renumber windows after deleting one
set-option -g renumber-windows on

# Use Alt-<number> to focus windows
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
